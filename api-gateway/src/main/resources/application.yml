server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - ${GATEWAY_ALLOWED_ORIGIN:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: user-service-auth
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**
        - id: category-service
          uri: ${CATEGORY_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/categories/**
        - id: product-service
          uri: ${PRODUCT_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/products/**
        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/movements/**,/api/v1/stock/**
        - id: report-service
          uri: ${REPORT_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/reports/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

